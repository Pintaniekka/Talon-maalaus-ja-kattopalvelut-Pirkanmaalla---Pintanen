name: Push Back to Pintaniekka
on:
  push:
    branches: [main]
jobs:
  push-back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # TÄMÄ ON TÄRKEÄ: estetään botin omien tunnusten käyttö
          persist-credentials: false
          fetch-depth: 0
      - name: Push to Pintaniekka branch
        run: |
          # Asetetaan git käyttämään sinun tokeniasi
          git remote add target https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/Pintaniekka/Talon-maalaus-ja-kattopalvelut-Pirkanmaalla---Pintanen.git
          # Pakotetaan pusku uuteen haaraan
          git push target HEAD:refs/heads/paivitys-b-tililta --force
