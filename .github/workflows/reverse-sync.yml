name: Push Back to Pintaniekka
on:
  push:
    branches: [main] # Aktivoituu, kun Lovable synkronoi koodin B-tilille
jobs:
  push-back:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Pintaniekka branch
        run: |
          # Määritellään A-tili kohteeksi
          git remote add target https://${{ secrets.SYNC_TOKEN }}@github.com/Pintaniekka/Talon-maalaus-ja-kattopalvelut-Pirkanmaalla---Pintanen.git
          # Lähetetään koodi A-tilin uuteen haaraan (branch)
          git push target HEAD:refs/heads/paivitys-b-tililta --force
