name: Deploy and Sync

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # VAIHE 1: Synkronointi
  sync-to-repereetta:
    runs-on: ubuntu-latest
    if: github.repository == 'Pintaniekka/Talon-maalaus-ja-kattopalvelut-Pirkanmaalla---Pintanen'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push to Repereetta
        run: |
          git remote remove target || true
          git remote add target https://${{ secrets.REPO_B_TOKEN }}@github.com/Repereetta/github-data-weaver.git
          git push target HEAD:main --force

  # VAIHE 2: Nettisivun rakennus
  build:
    runs-on: ubuntu-latest
    # Tämä estää Build-virheet Repereetta-tilillä
    if: github.repository == 'Pintaniekka/Talon-maalaus-ja-kattopalvelut-Pirkanmaalla---Pintanen'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  # VAIHE 3: Julkaisu
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    # Tämä estää Deploy (404) -virheet Repereetta-tilillä
    if: github.repository == 'Pintaniekka/Talon-maalaus-ja-kattopalvelut-Pirkanmaalla---Pintanen'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
