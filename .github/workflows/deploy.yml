name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Create SPA route directories
        run: |
          # Static routes
          ROUTES=(
            "kattopalvelut/pinnoitus"
            "kattopalvelut/puhdistus"
            "talon-maalaus"
            "toiminta-alueet"
            "referenssit"
            "meista"
          )

          # City slugs for dynamic routes
          CITIES=(
            "tampere"
            "sastamala"
            "hameenkyro"
            "ylojarvi"
            "nokia"
            "forssa"
            "hameenlinna"
            "huittinen"
            "akaa"
            "ikaalinen"
            "juupajoki"
            "kangasala"
            "kihnio"
            "lempaala"
            "mantta-vilppula"
            "orivesi"
            "parkano"
            "pirkkala"
            "palkane"
            "ruovesi"
            "urjala"
            "valkeakoski"
            "vesilahti"
            "virrat"
          )

          # Create static route directories
          for route in "${ROUTES[@]}"; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

          # Create city-specific route directories
          for city in "${CITIES[@]}"; do
            mkdir -p "dist/alue/$city"
            cp dist/index.html "dist/alue/$city/index.html"

            mkdir -p "dist/kattopalvelut/pinnoitus/$city"
            cp dist/index.html "dist/kattopalvelut/pinnoitus/$city/index.html"

            mkdir -p "dist/kattopalvelut/puhdistus/$city"
            cp dist/index.html "dist/kattopalvelut/puhdistus/$city/index.html"

            mkdir -p "dist/talon-maalaus/$city"
            cp dist/index.html "dist/talon-maalaus/$city/index.html"
          done

          echo "Created route directories for $(echo ${#ROUTES[@]} + ${#CITIES[@]} '*' 4 | bc) pages"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
